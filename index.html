<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>LOGIA School</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: 145px 1fr 90px;
      grid-template-columns: 240px 1fr;
    }

    header {
      grid-column: 1 / 3;
      border-bottom: 1px solid #999;
      padding: 20px;

      background-image: url("images/University-background.png");
      background-size: cover;
      background-position: center;

      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.55);
    }
    
    aside {
      border-right: 1px solid #999;


      padding: 20px;
      overflow-y: auto;
      background: #fafafa;
    }

    main {
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      grid-column: 1 / 3;
      border-top: 1px solid #999;
      padding: 18px 20px;
      background: #f5f5f5;
      font-size: 14px;
    }

    h1 {
      margin: 0;
      color: #444;
      text-shadow: none;
      font-weight: 900;
      font-size: 42px;
      position: relative;
      z-index: 1;
    }

    h1 a {
      color: #444;
      text-decoration: none;
    }

    h1 a:hover {
      color: #444;
      text-decoration: none;
    }

    h1 a:active {
      color: #444;
    }

    header p {
      margin: 4px;
      color: #666;
      position: relative;
      z-index: 1;
    }

    h2 {
      margin-top: 20px;
      font-size: 18px;
    }

    a {
      display: block;
      margin: 6px 0;
      color: #0066cc;
      text-decoration: none;
      transition: 0.2s;
    }

    a:hover {
      color: #003366;
    }
  </style>
</head>
