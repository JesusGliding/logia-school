<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미분적분학 학습보드</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 5px 20px 20px;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    .back-button {
      font-size: 15px;
      margin-left: 20px;
      color: #0066cc;
      text-decoration: none;

      position: relative;
      top: -3px;
    }

    .back-button:hover {
      color: #003366;
      text-decoration: underline;
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 230px 230px;
      gap: 20px;
    }

    .panel {
      border: 1px solid #999;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
      overflow: auto;
    }

    .panel h3 {
      margin-top: 0;
      font-size: 18px;
    }

    .status-panel p {
      margin: 4px 0;
    }

    textarea {
      width: 100%;
      height: 145px;
      resize: none;
      border: 1px solid #aaa;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;  
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar {
      width: 160px;
      height: 12px;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #eee;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #0066cc;
      transition: width 0.3s;
    }

    #elapsed-text {
      font-size: 14px;
      color: #003366;
      margin-left: 6px;
    }

    #study-days-text {
      font-size: 14px;
      color: #003366;
      margin-left: 6px;
    }

    @media (min-height: 720px) {
      .board-grid {
         grid-template-rows: 305px 305px;
      }
      textarea {
        height: 220px;
      }
    }

    @media (min-height: 850px) {
      .board-grid {
        grid-template-rows: 370px 370px;
      }
      textarea {
        height: 285px;
      }
    }
  </style>

</head>
<body>
  <h2>미분적분학 I · II &lt;학습 보드&gt;
  <a href="calculus.html" class="back-button" title="상위 페이지로 이동">↩️</a>
  </h2>

  <div class="board-grid">

    <section class="panel calendar-panel">
      <h3>날짜 달력</h3>
      <input type="date" id="study-date">
    </section>

    <section class="panel status-panel">
      <h3>학습 상태</h3>
      
      <p>
        <strong>학습시작 :</strong> 
        <span id="start-date">-</span>
        <span id="elapsed-text"></span>
      </p>

      <p><strong>오늘날짜 :</strong> <span id="today-text"></span></p>

      <p>
        <strong>최근학습 :</strong> 
        <span id="recent-date">-</span>
        <span id="study-days-text"></span>
      </p>
      
      <div class="progress-row">
        <strong>진도율 :</strong> 
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text">-</span>
      </div>

      <p><strong>학습시간 :</strong> <span id="studytime-text">-</span></p>

    </section>

    <section class="panel memo-panel">
      <h3>간단한 메모 노트</h3>
      <textarea id="memo-text"></textarea>
    </section>

    <section class="panel files-panel">
      <h3>학습 내용</h3>

      <ul id="files-list">
      </ul>
    </section>


  </div>

  <script>

  const SUBJECT = "calculus";  // 과목명 
  const START_DATE = "2026-06-25";  // 학습 시작일
  const INDEX_FILE = `${SUBJECT}-index.json`; // 학습 데이터 (JSON)
  let studyIndex = null;

  const dateInput = document.getElementById("study-date");
  const memoText = document.getElementById("memo-text");
  const progressText = document.getElementById("progress-text");
  const progressFill = document.getElementById("progress-fill");
  const filesList = document.getElementById("files-list");
  const startDateText = document.getElementById("start-date");
  const todayText = document.getElementById("today-text");
  const elapsedText = document.getElementById("elapsed-text");
  const studytimeText = document.getElementById("studytime-text");
  const recentDateText = document.getElementById("recent-date");
  const studyDaysText = document.getElementById("study-days-text");

  init();

  async function init() {

    const TODAY = getToday();

    startDateText.textContent = START_DATE;
    dateInput.value = TODAY;
    todayText.textContent = TODAY;
    elapsedText.textContent = `(${getElapsedDays(START_DATE, TODAY)}일 경과)`;

    await loadStudyIndex();

    loadStudyRecord(TODAY);

    dateInput.addEventListener("change", function () {
        loadStudyRecord(dateInput.value);
    });
  }

  async function loadStudyIndex() {
    const response = await fetch(INDEX_FILE);

    if (!response.ok) {
      throw new Error("index json not found");
    }

    studyIndex = await response.json();

    recentDateText.textContent = studyIndex.lastRecord || "-";
    studyDaysText.textContent = studyIndex.studyDays
      ? `(학습일 ${studyIndex.studyDays}일)`
      : "";
  }

  function loadStudyRecord(date) {
    if (!studyIndex || !studyIndex.records) {
      memoText.value = "학습 데이터베이스를 불러오지 못했습니다.";
      updateProgress("-");
      studytimeText.textContent = "-";
      filesList.innerHTML = "";
      return;
    }

    const record = studyIndex.records.find(item => item.date === date);

    if (!record) {
      memoText.value = "이 날짜에는 학습 기록이 없습니다.";
      updateProgress("-");
      studytimeText.textContent = "-";
      filesList.innerHTML = "";
      return;
    }

    memoText.value = record.memo && record.memo.length > 0
      ? record.memo.join("\n")
      : "메모가 없습니다.";

    updateProgress(record.progress || "-");

    studytimeText.textContent = record.studytime || "-";

    filesList.innerHTML = "";

    if (record.media && record.media.length > 0) {
      record.media.forEach(media => {
        const li = document.createElement("li");

        const link = document.createElement("a");
        link.href = `media/${media.file}`;
        link.target = "_blank";
        link.textContent = media.title || media.file;

        li.appendChild(link);
        filesList.appendChild(li);
      });
    }
  }

  function getToday() {

      const today = new Date();

      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
  }  

  function getElapsedDays(startDate, endDate) {
      const start = new Date(startDate);
      const end = new Date(endDate);
      const diff = end - start;

      return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
  }

  function updateProgress(progress) {
    const parts = progress.split("/");

    if (parts.length !== 2) {
      progressText.textContent = progress;
      progressFill.style.width = "0%";
      return;
    }

    const currentText = parts[0].trim();
    const total = Number(parts[1].trim());

    const currentParts = currentText.split(".");
    let currentValue = Number(currentText);

    if (currentParts.length === 2) {
      const chapter = Number(currentParts[0]);
      const sectionText = currentParts[1];
      const section = Number(sectionText);

      if (!isNaN(chapter) && !isNaN(section) && section >= 10) {
        currentValue = chapter + 0.99;
      }
    }

    if (isNaN(currentValue) || isNaN(total) || total <= 0) {
      progressText.textContent = "-";
      progressFill.style.width = "0%";
      return;
    }

    const percent = ((currentValue / total) * 100).toFixed(1);

    progressText.textContent = `${percent}% (${progress})`;
    progressFill.style.width = percent + "%";
  }

  </script>
</body>
</html>
