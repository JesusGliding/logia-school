<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미분적분학 학습보드</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1px 20px 20px;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .back-button {
      font-size: 15px;
      margin-left: 38px;
      color: #0066cc;
      text-decoration: none;

      position: relative;
      top: -3px;
    }

    .back-button:hover {
      color: #003366;
      text-decoration: underline;
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 232px 232px;
      gap: 20px;
    }

    .panel {
      border: 1px solid #999;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
      overflow: auto;
    }

    .panel h3 {
      margin-top: 0;
      font-size: 18px;
    }

    .status-panel p {
      margin: 4px 0;
    }

    textarea {
      width: 100%;
      height: 145px;
      resize: none;
      border: 1px solid #aaa;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;  
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar {
      width: 160px;
      height: 12px;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #eee;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #0066cc;
      transition: width 0.3s;
    }

    #elapsed-text {
      font-size: 14px;
      color: #003366;
      margin-left: 6px;
    }

    #study-days-text {
      font-size: 14px;
      color: #003366;
      margin-left: 6px;
    }

    .chapter-text {
      margin-top: 6px;
      margin-left: 4px;
      font-size: 14px;
    }

    .calendar-panel {
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .calendar-header button {
      width: 26px;
      height: 24px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 12px;
    }

    #calendar-title {
      font-size: 15px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar-grid,
    .calendar-weekdays,
    .calendar-header {
      width: 78%;
      margin: 0 auto;
    }

    .calendar-weekdays {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .calendar-day {
      height: 24px;
      line-height: 24px;
      padding: 0;
      margin: 1px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }

    .calendar-day:hover {
      background: #eef5ff;
    }

    .calendar-day.empty {
      cursor: default;
    }

    .calendar-day.today {
      border: 1px solid #0066cc;
    }

    .calendar-day.has-record {
      background: #dceeff;
      font-weight: bold;
      color: #0055aa;
    }

    .calendar-day.selected {
      outline: 2px solid #0066cc;
    }
    
    @media (min-height: 720px) {
      .board-grid {
         grid-template-rows: 305px 305px;
         gap: 25px;
         padding: 3px 2px 2px;
      }
      textarea {
        height: 220px;
      }
    }

    @media (min-height: 850px) {
      .board-grid {
        grid-template-rows: 370px 370px;
        gap: 30px;
        padding: 4px 8px 8px;
      }
      textarea {
        height: 285px;
      }
    }
  </style>
</head>

<body>
  <h2>미분적분학 I · II &lt;학습 보드&gt;
  <a href="calculus.html" class="back-button" title="상위 페이지로 이동">↩️</a>
  </h2>

  <div class="board-grid">

    <section class="panel calendar-panel">
      <!-- <h3>날짜 달력</h3> -->

      <div class="calendar-header">
        <button id="prev-month">◀</button>
        <strong id="calendar-title">-</strong>
        <button id="next-month">▶</button>
      </div>

      <div class="calendar-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>

      <div id="calendar-grid" class="calendar-grid"></div>

      <input type="date" id="study-date" hidden>
    </section>

    <section class="panel status-panel">
      <h3>학습 상태</h3>
      
      <p>
        <strong>학습시작 :</strong> 
        <span id="start-date">-</span>
        <span id="elapsed-text"></span>
      </p>

      <p>
        <strong>최근학습 :</strong> 
        <span id="recent-date">-</span>
        <span id="study-days-text"></span>
      </p>
      
      <div class="progress-row">
        <strong>진도율 :</strong> 
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text">-</span>
      </div>

      <p><strong>학습시간 :</strong> <span id="studytime-text">-</span></p>

      <p id="chapter-text" class="chapter-text">-</p>

    </section>

    <section class="panel memo-panel">
      <h3>간단한 메모 노트</h3>
      <textarea id="memo-text"></textarea>
    </section>

    <section class="panel files-panel">
      <h3>학습 내용</h3>

      <ul id="files-list">
      </ul>
    </section>


  </div>

  <script>

  const SUBJECT = "calculus";  // 과목명 
  const START_DATE = "2026-06-25";  // 학습 시작일
  const INDEX_FILE = `${SUBJECT}-index.json`; // 학습 데이터 (JSON)
  let studyIndex = null;
  const CHAPTER_FILE = `${SUBJECT}-chapters.txt`; // 챕터 데이터 (txt)
  let chapterList = [];  

  const calendarTitle = document.getElementById("calendar-title");
  const calendarGrid = document.getElementById("calendar-grid");
  const prevMonthButton = document.getElementById("prev-month");
  const nextMonthButton = document.getElementById("next-month");
  let calendarYear = null;
  let calendarMonth = null;

  const dateInput = document.getElementById("study-date");
  const memoText = document.getElementById("memo-text");
  const progressText = document.getElementById("progress-text");
  const progressFill = document.getElementById("progress-fill");
  const filesList = document.getElementById("files-list");
  const startDateText = document.getElementById("start-date");
  const elapsedText = document.getElementById("elapsed-text");
  const studytimeText = document.getElementById("studytime-text");
  const recentDateText = document.getElementById("recent-date");
  const studyDaysText = document.getElementById("study-days-text");
  const chapterText = document.getElementById("chapter-text");

  init();

  async function init() {

    const TODAY = getKoreaToday();

    startDateText.textContent = START_DATE;
    dateInput.value = TODAY;
    elapsedText.textContent = `(${getElapsedDays(START_DATE, TODAY)}일 경과)`;

    await loadChapterList();  
    await loadStudyIndex();

    dateInput.addEventListener("change", function () {
        loadStudyRecord(dateInput.value);
        selectCalendarDay(dateInput.value);
    });

    prevMonthButton.addEventListener("click", function () {
      calendarMonth--;

      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear--;
      }

      buildCalendar();
      markRecordedDates();
      selectCalendarDay(dateInput.value);
    });

    nextMonthButton.addEventListener("click", function () {
      calendarMonth++;

      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear++;
      }

      buildCalendar();
      markRecordedDates();
      selectCalendarDay(dateInput.value);
    });
  }

  async function loadStudyIndex() {
    const response = await fetch(INDEX_FILE, {cache: "no-cache"});

    if (!response.ok) {
      throw new Error("index json not found");
    }

    studyIndex = await response.json();

    recentDateText.textContent = studyIndex.lastRecord || "-";
    studyDaysText.textContent = studyIndex.studyDays
      ? `(학습일 ${studyIndex.studyDays}일)`
      : "";

    const today = getKoreaToday();
    const [year, month] = today.split("-").map(Number);

    calendarYear = year;
    calendarMonth = month - 1;

    dateInput.value = today;

    buildCalendar();
    markRecordedDates();

    loadStudyRecord(today);
    selectCalendarDay(today);
  }

  function loadStudyRecord(date) {
    if (!studyIndex || !studyIndex.records) {
      memoText.value = "학습 데이터베이스를 불러오지 못했습니다.";
      updateProgress("-");
      studytimeText.textContent = "-";
      filesList.innerHTML = "";
      return;
    }

    const record = studyIndex.records.find(item => item.date === date);

    if (!record) {
      memoText.value = "이 날짜에는 학습 기록이 없습니다.";
      updateProgress("-");
      studytimeText.textContent = "-";
      chapterText.textContent = "-";
      filesList.innerHTML = "";
      return;
    }

    memoText.value = record.memo && record.memo.length > 0
      ? record.memo.join("\n")
      : "메모가 없습니다.";

    updateProgress(record.progress || "-");
    chapterText.textContent = getChapterTitle(record.progress);

    studytimeText.textContent = record.studytime || "-";

    filesList.innerHTML = "";

    if (record.media && record.media.length > 0) {
      record.media.forEach(media => {
        const li = document.createElement("li");

        const link = document.createElement("a");
        link.href = `media/${media.file}`;
        link.target = "_blank";
        link.textContent = media.title || media.file;

        li.appendChild(link);
        filesList.appendChild(li);
      });
    }
  }

  function getKoreaToday() {
      const now = new Date();
     
      return new Intl.DateTimeFormat("en-ca", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
      }).format(now);
  }

  function getElapsedDays(startDate, endDate) {
      const start = new Date(startDate);
      const end = new Date(endDate);
      const diff = end - start;

      return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
  }

  function updateProgress(progress) {
    const parts = progress.split("/");

    if (parts.length !== 2) {
      progressText.textContent = progress;
      progressFill.style.width = "0%";
      return;
    }

    const currentText = parts[0].trim();
    const total = Number(parts[1].trim());

    const currentParts = currentText.split(".");
    let currentValue = Number(currentText);

    if (currentParts.length === 2) {
      const chapter = Number(currentParts[0]);
      const sectionText = currentParts[1];
      const section = Number(sectionText);

      if (!isNaN(chapter) && !isNaN(section) && section >= 10) {
        currentValue = chapter + 0.99;
      }
    }

    if (isNaN(currentValue) || isNaN(total) || total <= 0) {
      progressText.textContent = "-";
      progressFill.style.width = "0%";
      return;
    }

    const percent = ((currentValue / (total + 1)) * 100).toFixed(1); // chapter.section/chapter+1

    progressText.textContent = `${percent}% (${progress})`;
    progressFill.style.width = percent + "%";
  }

  function markRecordedDates() {
    if (!studyIndex || !studyIndex.records) return;

    studyIndex.records.forEach(record => {
      const cell = document.querySelector(`[data-date="${record.date}"]`);
      if (cell) {
        cell.classList.add("has-record");
      }
    });
  }

  function buildCalendar() {
    calendarGrid.innerHTML = "";

    calendarTitle.textContent = `${calendarYear}년 ${calendarMonth + 1}월`;

    const firstDay = new Date(calendarYear, calendarMonth, 1);
    const lastDay = new Date(calendarYear, calendarMonth + 1, 0);

    const startWeekday = firstDay.getDay();
    const lastDate = lastDay.getDate();

    for (let i = 0; i < startWeekday; i++) {
      const empty = document.createElement("div");
      empty.className = "calendar-day empty";
      calendarGrid.appendChild(empty);
    }

    const today = getKoreaToday();

    for (let day = 1; day <= lastDate; day++) {
      const date = `${calendarYear}-${String(calendarMonth + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

      const cell = document.createElement("div");
      cell.className = "calendar-day";
      cell.dataset.date = date;
      cell.textContent = day;

      if (date === today) {
        cell.classList.add("today");
      }

      cell.addEventListener("click", function () {
        dateInput.value = date;
        loadStudyRecord(date);
        selectCalendarDay(date);
      });

      calendarGrid.appendChild(cell);
    }
  }

  function selectCalendarDay(date) {
    document.querySelectorAll(".calendar-day.selected").forEach(cell => {
      cell.classList.remove("selected");
    });

    const selectedCell = document.querySelector(`[data-date="${date}"]`);

    if (selectedCell) {
      selectedCell.classList.add("selected");
    }
  }

  async function loadChapterList() {
    const response = await fetch(CHAPTER_FILE, {cache: "no-cache"});

    if (!response.ok) {
      chapterList = [];
      return;
    }

    const text = await response.text();
    
    chapterList = text
      .split("\n")
      .map(line => line.trim())
      .filter(line => line !== "");
  }

  function getProgressUnit(progress) {
    return String(progress).split("/")[0].trim();
  }

  function getChapterTitle(progress) {
    if (!progress || !chapterList.length) return "-";

    const unit = getProgressUnit(progress);
    const mainNumber = unit.split(".")[0];

    const mainTitle = chapterList.find(line => 
      line.startsWith(mainNumber + " ")
    );
     
    const subTitle = chapterList.find(line => 
      line.startsWith(unit + " ")
    );

    if (!mainTitle || !subTitle) return "-";

    return `(${mainTitle} - ${subTitle})`;
  }

  </script>
</body>
</html>
