<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>공업수학 학습보드</title>
    
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    .back-button {
      font-size: 15px;
      margin-left: 20px;
      color: #0066cc;
      text-decoration: none;

      position: relative;
      top: -3px;
    }

    .back-button:hover {
      color: #003366;
      text-decoration: underline;
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 280px 280px;
      gap: 20px;
    }

    .panel {
      border: 1px solid #999;
      border-radius: 12px;
      padding: 20px;
      background: #fafafa;
      overflow: auto;
    }

    .panel h3 {
      margin-top: 0;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      height: 180px;
      resize: none;
      border: 1px solid #aaa;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;  
    }

    @media (max-width: 800px) {
      .board-grid {
         grid-template-columns: 1fr;
         grid-template-rows: auto;
    }
    }
  </style>

</head>
<body>
  <h2>공업수학 <학습 보드>
  <a href="engineering-math.html" class="back-button" title="상위 페이지로 이동">↩️</a>
  </h2>

    <section class="panel calendar-panel">
      <h3>날짜 달력</h3>

    <section class="panel status-panel">
      <h3>학습 상태</h3>

      <p><strong>최근학습 :</strong> 6/26/2026</p>
    </section>

    <section class="panel memo-panel">

    공업수학 학습보드를 처음 만든날이다.

    <section class="panel files-panel">

      <ul>
        <li><a href="engineering-math/EngineeringMath_2026-06-27-cover.jpg" target="_blank">공업수학 교재 표지</a></li>
        <li><a href="engineering-math/EngineeringMath_2026-06-27-01.jpg" target="_blank">저자 서문</a></li>
        <li><a href="engineering-math/EngineeringMath_2026-06-27-02.jpg" target="_blank">공업수학 내용소개</a></li>
