<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>독서와 사색 | LOGIA School</title>

  <link
    rel="stylesheet"
    href="/assets/css/reading.css"
  >
</head>

<body>

  <main class="reading-page">

  <header class="reading-category-header">

    <button
      type="button"
      class="reading-category active"
      data-category="science"
      aria-selected="true"
    >
      <span class="category-title">
        과학 서적
      </span>

      <span class="category-subtitle">
        Science Reading & Reflection
      </span>
    </button>


    <button
      type="button"
      class="reading-category"
      data-category="philosophy"
      aria-selected="false"
    >
      <span class="category-title">
        철학 서적
      </span>

      <span class="category-subtitle">
        Philosophy Reading & Reflection
      </span>
    </button>


    <button
      type="button"
      class="reading-category"
      data-category="fiction"
      aria-selected="false"
    >
      <span class="category-title">
        소설과 에세이
      </span>

      <span class="category-subtitle">
        Fiction and Essays Reading
      </span>
    </button>


    <button
      type="button"
      class="reading-category"
      data-category="humanities"
      aria-selected="false"
    >
      <span class="category-title">
        인문·교양
      </span>

      <span class="category-subtitle">
        Humanities & Reflection
      </span>
    </button>

  </header>

    <!-- 전체 2단 구조 -->
    <section class="reading-layout">


      <!-- 왼쪽: 분야별 목록 및 상세 정보 -->
      <div class="reading-main">


        <!-- 날짜별 완독 목록 -->
        <section class="reading-panel completed-panel">

          <header class="panel-header">

            <h2>
              날짜별 읽은 목록
            </h2>

            <span
              id="completed-count"
              class="panel-count"
            >
              0권
            </span>

          </header>

          <div
            id="completed-list"
            class="book-list completed-list"
          >
            <p class="empty-message">
              완독한 책이 없습니다.
            </p>
          </div>

        </section>


        <!-- 읽고 있는 책 -->
        <section class="reading-panel current-panel">

          <header class="panel-header">

            <h2>
              읽고 있는 책
            </h2>

            <span
              id="reading-count"
              class="panel-count"
            >
              0권
            </span>

          </header>

          <div
            id="reading-list"
            class="book-list reading-list"
          >
            <p class="empty-message">
              현재 읽고 있는 책이 없습니다.
            </p>
          </div>

        </section>


        <!-- 선택한 도서 정보 -->
        <section class="reading-panel detail-panel">

          <header class="panel-header">

            <h2>
              선택한 도서 정보
            </h2>

            <span
              id="selected-category"
              class="panel-count"
            ></span>

          </header>

          <article
            id="book-detail"
            class="book-detail"
          >
            <p class="empty-message">
              목록 또는 검색 결과에서 도서를 선택해 주세요.
            </p>
          </article>

        </section>

      </div>


      <!-- 오른쪽: 전체 도서 검색 -->
      <aside class="reading-sidebar">

        <section class="reading-panel search-panel">

          <header class="panel-header">

            <h2>
              전체 도서 자료 검색
            </h2>

          </header>


          <form
            id="search-form"
            class="search-form"
          >

            <div class="search-field">

              <label for="search-title">
                제목
              </label>

              <input
                id="search-title"
                name="title"
                type="search"
                autocomplete="off"
              >

            </div>


            <div class="search-field">

              <label for="search-author">
                저자
              </label>

              <input
                id="search-author"
                name="author"
                type="search"
                autocomplete="off"
              >

            </div>


            <div class="search-field">

              <label for="search-date">
                날짜
              </label>

              <input
                id="search-date"
                name="date"
                type="search"
                placeholder="예: 2026-06"
                autocomplete="off"
              >

            </div>


            <div class="search-field">

              <label for="search-word">
                단어
              </label>

              <input
                id="search-word"
                name="word"
                type="search"
                placeholder="키워드, 내용, 감상"
                autocomplete="off"
              >

            </div>


            <div class="search-buttons">

              <button type="submit">
                검색
              </button>

              <button
                id="search-reset"
                type="button"
              >
                초기화
              </button>

            </div>

          </form>


          <div class="search-summary">

            <span id="search-status">
              전체 도서
            </span>

            <span id="search-count">
              0권
            </span>

          </div>


          <div
            id="search-results"
            class="search-results"
          >
            <p class="empty-message">
              검색 결과가 여기에 표시됩니다.
            </p>
          </div>

        </section>

      </aside>

    </section>

  </main>


  <!-- Reading 시스템 설정 -->

  <script>
    const READING_CONFIG = {
      defaultCategory: "science",

      /* 기존 단일 페이지 JS가 읽을 임시 설정 */
      dataFile: "science/science-index.json",
      mediaPath: "science/media/",

      categories: {
        science: {
          title: "과학 서적",
          dataFile: "science/science-index.json",
          mediaPath: "science/media/"
        },

        philosophy: {
          title: "철학 서적",
          dataFile: "philosophy/philosophy-index.json",
          mediaPath: "philosophy/media/"
        },

        fiction: {
          title: "소설과 에세이",
          dataFile: "fiction/fiction-index.json",
          mediaPath: "fiction/media/"
        },

        humanities: {
          title: "인문·교양",
          dataFile: "humanities/humanities-index.json",
          mediaPath: "humanities/media/"
        }
      }
    };
  </script>

  <script src="/assets/js/reading-board.js"></script>

</body>
</html>
